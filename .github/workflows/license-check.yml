name: License Header Check

on:
  push:
    branches: ["master", "dev"]
  pull_request:
    branches: ["master", "dev"]

jobs:
  license-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check license headers
        uses: apache/skywalking-eyes@v0.6.0
        with:
          config: .licenserc.yaml
          mode: check
