name: R2 Presign Security Smoke Tests

"on":
  workflow_dispatch:
  push:
    branches: ["dev"]

jobs:
  smoke-test:
    name: Security Smoke Tests (r2-presign)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Validate required security test secrets
        env:
          PRESIGN_URL: ${{ secrets.PRESIGN_URL }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=""
          for key in PRESIGN_URL ALLOWED_ORIGIN SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!key}" ]; then
              missing="$missing $key"
            fi
          done

          if [ -n "$missing" ]; then
            echo "Missing required secrets:$missing"
            echo "Set them in repository or environment secrets before running this workflow."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run r2-presign security smoke tests
        env:
          PRESIGN_URL: ${{ secrets.PRESIGN_URL }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run security:test:r2-presign
